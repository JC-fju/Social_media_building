<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDEN - 社群平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/eden.css') }}">
</head>
<body>

    <div class="sidebar-wrapper">
        <div class="hamburger-btn">☰</div>
        <nav class="side-menu">
            <a href="{{ url_for('home') }}">首頁 HOME</a>
            <a href="{{ url_for('about') }}">關於我們 ABOUT</a>
            <a href="{{ url_for('achievements') }}">成果展示 ACHIEVEMENTS</a>
            <a href="{{ url_for('contact') }}">聯絡我們 CONTACT</a>
        </nav>
    </div>

    <div class="main-content">
        
        <div class="top-header">
            <img src="{{ url_for('static', filename='image/icon.webp') }}" alt="EDEN Icon" class="header-icon">
        </div>

        <div class="news-section">
            <div class="news-header">
                <h2>最新消息 <span class="slash">//</span></h2>
            </div>
            
            <div class="news-grid">
                {% for news in news_list %}
                <div class="news-item">
                    <div class="news-date">
                        <div class="month">{{ news.date.split('-')[0] }}月</div>
                        <div class="day">{{ news.date.split('-')[1] }}</div>
                    </div>
                    <div class="news-content">
                        <div class="tags">
                            <span class="tag normal">{{ news.tag }}</span>
                        </div>
                        <a href="{{ news.link }}" target="_blank" class="news-title">{{ news.title }}</a>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        
    </div>

</body>
</html>
